repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
    -   id: end-of-file-fixer
    -   id: trailing-whitespace

-   repo: local
    hooks:
    -   id: semgrep
        name: semgrep
        entry: semgrep
        args: ['--config', '.semgrep/rules.yaml', '--error']
        language: system
        types: [python]
