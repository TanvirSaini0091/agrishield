rules:
  - id: detect-hardcoded-google-api-key
    pattern-regex: 'AIzaSy[A-Za-z0-9_\-]*'
    languages:
      - python
    message: "Security warning: A hardcoded Google API key prefix was detected. Storing API keys or credentials directly in source code is insecure and violates secure coding standards. Please use environment variables or a secure secret manager instead."
    severity: ERROR
